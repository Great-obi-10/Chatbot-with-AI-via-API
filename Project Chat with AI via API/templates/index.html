<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
            margin-top:50px;
        }

        #chatbox{
            width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px 20px;
            background:#007BFF;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        #response{
            margin-top:20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div id="chatbox">

<h2>Chat with AI</h2>

<input id="message" type="text" placeholder="Ask something..." />

<button onclick="sendMessage()">Send</button>

<p id="response"></p>

</div>

<script>

async function sendMessage(){

    let message = document.getElementById("message").value

    let res = await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:message
        })
    })

    let data = await res.json()

    document.getElementById("response").innerText = data.response

}

</script>

</body>
</html>
